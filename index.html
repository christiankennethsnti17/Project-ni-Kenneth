<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Multimedia Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header / Image Area -->
        <div class="profile-card">
            <h1>Multimedia Profile</h1>
            <p>Click the buttons to interact!</p>
            
            <!-- Placeholder for an Image -->
            <div class="image-box">
                <img src="https://via.placeholder.com/150" alt="Profile Pic">
            </div>

            <!-- Controls -->
            <div class="controls">
                <button onclick="playMusic()" id="musicBtn">🎵 Play Music</button>
                <button onclick="changeTheme('blue')">🔵 Playlist</button>
                <button onclick="changeTheme('red')">🔴 Search</button>
            </div>
            
            <audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
